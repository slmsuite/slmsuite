p47:
  name: ".47 PLM"
  shape: [540, 960]
  pitch: [1.08e-05, 1.08e-05]
  displacement_ratios:
    [0.0, 0.0126, 0.0259, 0.0495, 0.071, 0.0878, 0.1382, 0.2153,
     0.3274, 0.361, 0.4204, 0.5046, 0.5916, 0.673, 0.8254, 1.0]
  memory_lut: [3, 2, 1, 7, 0, 6, 5, 4, 11, 10, 9, 8, 15, 14, 13, 12]
  electrode_layout:
    - [2, 3]
    - [0, 1]
  data_flip: [0, 0]

p67:
  name: ".67 PLM"
  shape: [800, 1358]
  pitch: [1.08e-05, 1.08e-05]
  # Modified to match values in p67 EVM user guide
  displacement_ratios:
    [0.0, 0.0107, 0.0219, 0.0450, 0.0598, 0.0775, 0.1206, 0.1850,
     0.3655, 0.3955, 0.4510, 0.5244, 0.6393, 0.7116, 0.8502, 1.0]
  memory_lut: [3, 2, 1, 7, 0, 6, 5, 4, 11, 10, 9, 8, 15, 14, 13, 12]
  electrode_layout:
    - [1, 3]
    - [0, 2]
  data_flip: [0, 1]

